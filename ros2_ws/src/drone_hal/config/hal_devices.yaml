# DroneOS HAL device descriptor list.
#
# Each entry becomes a drone_hal.device.DeviceDescriptor. driver_class is a
# "module.path:ClassName" reference resolved at runtime by DriverLoader, so
# adding a new device here (once its driver package is installed) requires
# no change to drone_hal itself.
#
# No devices are enabled by default: drone_camera, drone_fc,
# drone_rangefinder, and drone_optical_flow (Phase 2 packages 2-5) do not
# exist yet. Entries below are commented examples of the expected shape.

devices: []

# Example (uncomment once drone_rangefinder is implemented):
